<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이화여자고등학교 교정 지도 및 길찾기</title>
    <style>
        /* 기본 전체 스타일 */
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* 메인 페이지 (지도 화면) */
        #map-view {
            text-align: center;
            padding: 20px;
        }

        h1 { color: #1b5e20; margin-bottom: 5px; }
        
        .instruction {
            color: #555;
            margin-bottom: 20px;
        }

        /* 길찾기 바 (컨트롤러 영역) */
        .search-bar {
            background-color: white;
            max-width: 900px;
            margin: 0 auto 20px auto;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-bar label {
            font-weight: bold;
            color: #1b5e20;
        }

        .search-bar select {
            padding: 10px 15px;
            font-size: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            min-width: 180px;
            cursor: pointer;
            outline: none;
        }
        .search-bar select:focus {
            border-color: #00643E;
        }

        .search-btn {
            background-color: #00643E;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-btn:hover {
            background-color: #004d30;
        }

        /* 지도를 감싸는 영역 */
        .image-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        /* 지도 이미지 */
        .image-container img {
            width: 100%;
            display: block;
        }

        /* 경로를 그릴 투명 캔버스 */
        #route-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 클릭 이벤트가 아래의 핀들에게 가도록 설정 */
            z-index: 5;
        }

        /* 클릭 가능한 투명한 버튼(핀) 스타일 */
        .map-pin {
            position: absolute;
            background-color: rgba(46, 204, 113, 0.4);
            border: 2px solid #27ae60;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .map-pin:hover {
            background-color: rgba(46, 204, 113, 0.8);
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* 상세 설명 페이지 */
        #detail-view {
            display: none;
            padding: 40px 20px;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
        }

        #detail-title {
            color: #1b5e20;
            font-size: 28px;
            margin-bottom: 20px;
        }

        /* 상세 설명 내 삽입되는 이미지 스타일 */
        .detail-img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 8px;
            margin: 0 auto 20px auto;
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 이미지가 2장일 때 가로 배치를 위한 컨테이너 */
        .img-flex-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            max-width: 500px;
            margin: 0 auto 20px auto;
        }
        .img-flex-container .detail-img {
            flex: 1;
            width: 50%;
            margin-bottom: 0;
        }

        #detail-desc {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 40px;
            color: #444;
            text-align: left;
            display: inline-block;
            word-break: keep-all;
        }

        /* 층별 안내 박스 디자인 */
        .floor-plan {
            background-color: #f9f9f9;
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #ddd;
            font-size: 15px;
            line-height: 1.6;
        }

        /* 뒤로가기 버튼 */
        .back-btn {
            background-color: #1b5e20;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: block;
            margin: 0 auto;
        }

        .back-btn:hover { background-color: #144d18; }
    </style>
</head>

    <script>
        const placeData = {
            1: { title: "1. 이화 박물관(심슨 기념관)", img: ["ewha-1.jpg"], desc: "1915년에 건립되어 교내에서 가장 오래된 건물입니다.<br>붉은 벽돌로 지어진 서양식 근대 건축물로 등록문화재 제3호로 지정되어 있습니다.<br>현재는 이화의 역사와 유관순 열사의 옛 교실 등을 복원해 전시하는 박물관으로 사용 중입니다." },

            c4: { x: 0.52, y: 0.40 }, // 도서관 - 노천극장 사이 중심길
            c5: { x: 0.60, y: 0.48 }, // 노천극장 진입로
            c6: { x: 0.45, y: 0.68 }, // 대운동장 - 유관순기념관 분기점
            c7: { x: 0.55, y: 0.80 }, // 유관순기념관 - 기숙사 사이 보행로
            c8: { x: 0.35, y: 0.78 }  // 체육관 - 교회 앞마당 길
        };

        // 실제 보행로 기준 인접 네트워크 그래프 정의 (가중치는 좌표 거리 자동 계산)
        const graph = {
            p1: ['c1'],
            p2: ['c1'],
            p3: ['c2'],
            p4: ['c3'],
            p5: ['c5'],
            p6: ['c6', 'c7'],
            p7: ['c8', 'p13'],
            p8: ['c8', 'c7'],
            p9: ['c7'],
            p10: ['c4', 'c6'],
            p11: ['c4'],
            p12: ['c3'], // 동문은 우물터 가는 길목과 연계
            p13: ['p7'], // 서문은 체육관 진입로 연계
            
            // 교차로 보행망 연계 (러시아 대사관/중학교 구역을 우회하는 안전 로드망)
            c1: ['p1', 'p2', 'c2'],
            c2: ['c1', 'p3', 'c3', 'c5'],
            c3: ['c2', 'p4', 'p12'],
            c4: ['p11', 'p10', 'c1', 'c6'],
            c5: ['c2', 'p5', 'c7'],
            c6: ['c4', 'p10', 'p6', 'c8'],
            c7: ['p6', 'p9', 'p8', 'c5'],
            c8: ['c6', 'p7', 'p8']
        };

        // 두 점 사이의 직선거리 계산 함수
        function getDistance(n1, n2) {
            let dx = nodes[n1].x - nodes[n2].x;
            let dy = nodes[n1].y - nodes[n2].y;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // --- 다익스트라(Dijkstra) 최단 경로 알고리즘 ---
        function dijkstra(start, end) {
            let distances = {};
            let prev = {};
            let pq = [];

            for (let node in nodes) {
                distances[node] = Infinity;
                prev[node] = null;
            }
            distances[start] = 0;
            pq.push({ node: start, dist: 0 });

            while (pq.length > 0) {
                pq.sort((a, b) => a.dist - b.dist);
                let current = pq.shift().node;

                if (current === end) break;

                if (!graph[current]) continue;
                for (let neighbor of graph[current]) {
                    let alt = distances[current] + getDistance(current, neighbor);
                    if (alt < distances[neighbor]) {
                        distances[neighbor] = alt;
                        prev[neighbor] = current;
                        pq.push({ node: neighbor, dist: alt });
                    }
                }
            }

            // 최단 경로 노드 배열 추적 복원
            let path = [];
            let curr = end;
            while (curr !== null) {
                path.unshift(curr);
                curr = prev[curr];
            }
            return path[0] === start ? path : [];
        }

        // --- 최단거리 길 그리기 및 애니메이션 연출 ---
        function findRoute() {
            const startNode = document.getElementById('start-select').value;
            const endNode = document.getElementById('end-select').value;

            if (!startNode || !endNode) {
                alert("출발위치와 도착위치를 모두 선택해주세요.");
                return;
            }
            if (startNode === endNode) {
                alert("출발지와 도착지가 같습니다!");
                return;
            }

            const path = dijkstra(startNode, endNode);
            drawRouteOnCanvas(path);
        }

        function drawRouteOnCanvas(path) {
            const canvas = document.getElementById('route-canvas');
            const ctx = canvas.getContext('2d');
            const img = document.getElementById('map-img');

            // 캔버스 크기를 현재 로드된 지도 이미지 크기와 정확히 동기화
            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (path.length === 0) return;

            // 1. 실제 교내 길 최단거리 선 그리기 (색상: #E54B4B)
            ctx.beginPath();
            for (let i = 0; i < path.length; i++) {
                let n = nodes[path[i]];
                let realX = n.x * canvas.width;
                let realY = n.y * canvas.height;
                if (i === 0) ctx.moveTo(realX, realY);
                else ctx.lineTo(realX, realY);
            }
            ctx.lineWidth = 6;
            ctx.strokeStyle = "#E54B4B";
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            ctx.stroke();

            // 2. 출발지점 빨간색 동그라미 핀그리기 (#E54B4B)
            let startNode = nodes[path[0]];
            ctx.beginPath();
            ctx.arc(startNode.x * canvas.width, startNode.y * canvas.height, 10, 0, 2 * Math.PI);
            ctx.fillStyle = "#E54B4B";
            ctx.strokeStyle = "#white";
            ctx.lineWidth = 2;
            ctx.fill();
            ctx.stroke();

            // 3. 도착지점 빨간색 동그라미 핀그리기 (#E54B4B)
            let endNode = nodes[path[path.length - 1]];
            ctx.beginPath();
            ctx.arc(endNode.x * canvas.width, endNode.y * canvas.height, 10, 0, 2 * Math.PI);
            ctx.fillStyle = "#E54B4B";
            ctx.strokeStyle = "#white";
            ctx.lineWidth = 2;
            ctx.fill();
            ctx.stroke();
        }

        // 브라우저 리사이즈 시 라인이 찌그러지지 않도록 대응 조정
        window.addEventListener('resize', () => {
            const startNode = document.getElementById('start-select').value;
            const endNode = document.getElementById('end-select').value;
            if (startNode && endNode) {
                const path = dijkstra(startNode, endNode);
                drawRouteOnCanvas(path);
            }
        });

        // --- 기존 상세 보기 페이지 전환 제어 ---
        const mapView = document.getElementById('map-view');
        const detailView = document.getElementById('detail-view');
        const titleElement = document.getElementById('detail-title');
        const imgContainer = document.getElementById('detail-img-container');
        const descElement = document.getElementById('detail-desc');

        function showDetail(id) {
            const data = placeData[id];
            titleElement.innerText = data.title;
            descElement.innerHTML = data.desc; 

            imgContainer.innerHTML = "";
            if (data.img && data.img.length > 0) {
                if (data.img.length === 1) {
                    const imgTag = document.createElement('img');
                    imgTag.src = data.img[0];
                    imgTag.alt = data.title;
                    imgTag.className = 'detail-img';
                    imgContainer.appendChild(imgTag);
                } else {
                    const flexDiv = document.createElement('div');
                    flexDiv.className = 'img-flex-container';
                    data.img.forEach(src => {
                        const imgTag = document.createElement('img');
                        imgTag.src = src;
                        imgTag.alt = data.title;
                        imgTag.className = 'detail-img';
                        flexDiv.appendChild(imgTag);
                    });
                    imgContainer.appendChild(flexDiv);
                }
            }

            mapView.style.display = 'none';
            detailView.style.display = 'block';
            window.scrollTo(0, 0);
        }

        function showMap() {
            detailView.style.display = 'none';
            mapView.style.display = 'block';
        }
    </script>
</body>
