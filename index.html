<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이화여자고등학교 교정 지도</title>
    <style>
        /* 기본 전체 스타일 */
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* 메인 페이지 (지도 화면) */
        #map-view {
            text-align: center;
            padding: 20px;
        }

        h1 { color: #1b5e20; }
        
        .instruction {
            color: #555;
            margin-bottom: 20px;
        }

        /* 지도를 감싸는 영역 */
        .image-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        /* 지도 이미지 */
        .image-container img {
            width: 100%;
            display: block;
        }

        /* 클릭 가능한 투명한 버튼(핀) 스타일 */
        .map-pin {
            position: absolute;
            background-color: rgba(46, 204, 113, 0.4);
            border: 2px solid #27ae60;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }

        .map-pin:hover {
            background-color: rgba(46, 204, 113, 0.8);
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* 상세 설명 페이지 */
        #detail-view {
            display: none;
            padding: 40px 20px;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
        }

        #detail-title {
            color: #1b5e20;
            font-size: 28px;
            margin-bottom: 20px;
        }

        /* 상세 설명 내 삽입되는 이미지 스타일 */
        .detail-img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 8px;
            margin: 0 auto 20px auto;
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 이미지가 2장일 때 가로 배치를 위한 컨테이너 */
        .img-flex-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            max-width: 500px;
            margin: 0 auto 20px auto;
        }
        .img-flex-container .detail-img {
            flex: 1;
            width: 50%;
            margin-bottom: 0;
        }

        #detail-desc {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 40px;
            color: #444;
            text-align: left; /* 긴 텍스트와 층별 안내를 위해 좌측 정렬 */
            display: inline-block;
            word-break: keep-all;
        }

        /* 층별 안내 박스 디자인 */
        .floor-plan {
            background-color: #f9f9f9;
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #ddd;
            font-size: 15px;
            line-height: 1.6;
        }

        /* 뒤로가기 버튼 */
        .back-btn {
            background-color: #1b5e20;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: block;
            margin: 0 auto;
        }

        .back-btn:hover { background-color: #144d18; }
    </style>
</head>
<body>

    <div id="map-view">
        <h1>이화여자고등학교 교정 지도</h1>
        <p class="instruction">지도에서 초록색 동그라미(장소)를 클릭하면 상세 설명이 나옵니다.</p>

        <div class="image-container">
            <img src="map.png" alt="이화여고 캠퍼스 지도">
            
            <div class="map-pin" style="top: 13%; left: 69%; width: 6%; height: 8%;" onclick="showDetail(1)" title="1. 이화 박물관"></div>
            <div class="map-pin" style="top: 13%; left: 56%; width: 6%; height: 8%;" onclick="showDetail(2)" title="2. 이화 백주년기념관"></div>
            <div class="map-pin" style="top: 31%; left: 67%; width: 6%; height: 8%;" onclick="showDetail(3)" title="3. 본관"></div>
            <div class="map-pin" style="top: 34%; left: 84%; width: 6%; height: 8%;" onclick="showDetail(4)" title="4. 유관순 우물터"></div>
            <div class="map-pin" style="top: 58%; left: 60%; width: 6%; height: 8%;" onclick="showDetail(5)" title="5. 노천극장"></div>
            <div class="map-pin" style="top: 82%; left: 47%; width: 6%; height: 8%;" onclick="showDetail(6)" title="6. 유관순 기념관"></div>
            <div class="map-pin" style="top: 88%; left: 28%; width: 6%; height: 8%;" onclick="showDetail(7)" title="7. 체육관"></div>
            <div class="map-pin" style="top: 88%; left: 38%; width: 6%; height: 8%;" onclick="showDetail(8)" title="8. 이화교회"></div>
            <div class="map-pin" style="top: 88%; left: 65%; width: 6%; height: 8%;" onclick="showDetail(9)" title="9. 기숙사"></div>
            <div class="map-pin" style="top: 64%; left: 24%; width: 6%; height: 8%;" onclick="showDetail(10)" title="10. 대운동장"></div>
            <div class="map-pin" style="top: 37%; left: 33%; width: 5%; height: 7%;" onclick="showDetail(11)" title="11. 도서관"></div>
        </div>
    </div>

    <div id="detail-view">
        <h2 id="detail-title">장소 이름</h2>
        <div id="detail-img-container"></div>
        <div id="detail-desc">장소에 대한 설명이 이곳에 표시됩니다.</div>
        <br>
        <button class="back-btn" onclick="showMap()">← 지도로 돌아가기</button>
    </div>

    <script>
        const placeData = {
            1: { 
                title: "1. 이화 박물관(심슨 기념관)", 
                img: ["ewha-1.jpg"], // 1번 이미지가 있다면 불러옵니다.
                desc: "1915년에 건립되어 교내에서 가장 오래된 건물입니다.<br>붉은 벽돌로 지어진 서양식 근대 건축물로 등록문화재 제3호로 지정되어 있습니다.<br>현재는 이화의 역사와 유관순 열사의 옛 교실 등을 복원해 전시하는 박물관으로 사용 중입니다." 
            },
            2: { 
                title: "2. 이화 백주년기념관", 
                img: ["ewha-2.jpg"],
                desc: "2004년에 건립된 복합 문화 예술 공간입니다. 현대적인 건축물 내에 미술 전시관과 공연장 등을 갖추고 있어 교내 행사는 물론 외부의 다양한 문화 행사도 열리는 곳입니다.<br><div class='floor-plan'><strong>[층별 안내]</strong><br>5층> 예절실, 지능형과학실, 컴퓨터실, 미술작업실, 종교과실 🚹<br>4층> 생물 실험실, 화학 실험실, 물리 실험실, 지구과학실험실, 교사공동연구실 🚹🚺<br>3층> 프라이홀, ESC, PASCH, 시청각실, 본관연결통로<br>2층> 화암홀(2층), 기도실, 공연연습실, 음악 연습실12345, 어학실습실, 모임방 🚹🚺<br>1층> 화암홀, 음악실1, 이화카페 🚹🚺<br>B1> 이화아트갤러리, 무대 대기실, 무대입구, 분장실(여, 남), 전기실, 사무실 🚹🚺<br>B2> 무대리프트, 휴게실 🅿️<br>B3> 공조실, 저수조, 기계실, 발전기실 🅿️</div>" 
            },
            3: { 
                title: "3. 본관(화암신봉조관)", 
                img: ["ewha-3.jpg"],
                desc: "1970년에 완공된 7층 규모의 건물로 현재 교무실, 교실, 학생식당 등이 자리한 학교의 중심 시설입니다. 이화학당의 발전에 크게 기여한 화암 신봉조 선생의 이름을 땄습니다.<br><div class='floor-plan'><strong>[층별 안내]</strong><br>8층> 교직원식당<br>7층> 학생식당<br>6층> 교실<br>5층> 교실<br>4층> 교실(+지리과실)<br>3층> 교실(+교목실/종교상담실)<br>2층> 교무실, 교장실, 방송실<br>1층> 학생회실, 사회과실, 상담실, 보건실, 라온담소, 행정실, 로비<br>0.5층> 동아리연합회실, 음악실<br>B1> 매점<br><br><small>* B1층은 동문 기준 1층에 해당합니다.</small></div>" 
            },
            4: { 
                title: "4. 유관순 우물터", 
                img: ["ewha-4.jpg"],
                desc: "이화학당 시절 유관순 열사가 직접 빨래를 했던 우물터가 원형에 가깝게 보존되어 있습니다.<br>당시 기숙사 학생들의 생활상을 짐작할 수 있는 뭉클한 역사적 흔적입니다." 
            },
            5: { 
                title: "5. 노천극장", 
                img: ["ewha-5.jpg"],
                desc: "고대 로마 원형 극장 양식으로 지어진 야외 무대입니다.<br>과거 수학 교사의 설계로 학생들이 직접 돌을 날라 만들었다고 전해지며, 개교기념식이나 야외 횃불예배 등 상징적인 행사들이 열립니다." 
            },
            6: { 
                title: "6. 유관순 기념관", 
                img: ["ewha-6(1).jpg", "ewha-6(2).jpg"], // 이미지 2장 매칭
                desc: "대규모 인원을 수용할 수 있는 대강당입니다.<br>평소 학생들의 채플(예배) 장소로 쓰이며, 매년 유관순상 시상식과 학교의 굵직한 주요 행사들이 이곳에서 진행됩니다. 학교 축제나 매주 수요일 예배가 이곳에서 진행됩니다." 
            },
            7: { 
                title: "7. 체육관(백상규 기념관)", 
                img: ["ewha-7.jpg"],
                desc: "이화학원 3대 이사장이었던 백상규 선생을 기념하여 명명된 체육 시설입니다.<br>내부에는 일반 체육관 시설뿐만 아니라 무용실, 골프 연습실 등이 갖춰져 있습니다.<br><div class='floor-plan'><strong>[주요 시설]</strong><br>무용실, 체력단련실, 실내 체육관, 실내 골프장</div>" 
            },
            8: { 
                title: "8. 이화교회", 
                img: ["ewha-8.jpg"],
                desc: "기독교(감리교) 정신을 바탕으로 세워진 이화의 신앙적 뿌리를 상징하는 교내 교회입니다.<br>동창회관 및 장학재단과 함께 위치해 학생과 동문들의 영적 구심점 역할을 합니다." 
            },
            9: { 
                title: "9. 이화학사 김점동관(기숙사)", 
                img: ["ewha-9.jpg"],
                desc: "2013년에 완공된 약 450명 수용 규모의 현대식 기숙사입니다.<br>한국 최초의 여성 의사이자 이화학당 출신인 '김점동(박에스더)'의 이름을 따서 명명되었습니다.<br><div class='floor-plan'><strong>[층별 안내]</strong><br>2~7층> 기도실, 휴게실, 보건실(2층)<br>1층> 다목적실, 토론방, 자율학습실, 휴게실<br>B1> 자율학습실</div>" 
            },
            10: { 
                title: "10. 대운동장", 
                img: ["ewha-10.jpg"],
                desc: "캠퍼스 중앙에 자리한 넓은 운동장입니다.<br>주변의 아름다운 나무와 잔디밭 조경이 어우러져 학생들의 체육 수업과 쉼터로 활용됩니다. 학교 체육대회나 주차장으로 사용되기도 합니다. 이화외고 학생들과 함께 사용됩니다." 
            },
            11: { 
                title: "11. 도서관(전인항 기념 도서관)", 
                img: ["ewha-11.jpg"],
                desc: "1986년 개교 100주년을 기념하여 준공된 도서관입니다.<br>학생들의 학업과 독서 활동을 지원하는 교육의 핵심 공간입니다.<br><div class='floor-plan'><strong>[층별 안내]</strong><br>3층> 자율학습실, 평화방, 도담방<br>2층> 누리터(자료열람실)<br>1층> 학교법인사무실</div>" 
            }
        };

        const mapView = document.getElementById('map-view');
        const detailView = document.getElementById('detail-view');
        const titleElement = document.getElementById('detail-title');
        const imgContainer = document.getElementById('detail-img-container');
        const descElement = document.getElementById('detail-desc');

        function showDetail(id) {
            const data = placeData[id];
            titleElement.innerText = data.title;
            descElement.innerHTML = data.desc; 

            // 이미지 영역 비우고 새로 생성
            imgContainer.innerHTML = "";
            if (data.img && data.img.length > 0) {
                if (data.img.length === 1) {
                    // 이미지가 1장일 때
                    const imgTag = document.createElement('img');
                    imgTag.src = data.img[0];
                    imgTag.alt = data.title;
                    imgTag.className = 'detail-img';
                    imgContainer.appendChild(imgTag);
                } else {
                    // 이미지가 여러 장일 때 (6번 유관순 기념관 등) 가로 배치 적용
                    const flexDiv = document.createElement('div');
                    flexDiv.className = 'img-flex-container';
                    data.img.forEach(src => {
                        const imgTag = document.createElement('img');
                        imgTag.src = src;
                        imgTag.alt = data.title;
                        imgTag.className = 'detail-img';
                        flexDiv.appendChild(imgTag);
                    });
                    imgContainer.appendChild(flexDiv);
                }
            }

            mapView.style.display = 'none';
            detailView.style.display = 'block';
            window.scrollTo(0, 0);
        }

        function showMap() {
            detailView.style.display = 'none';
            mapView.style.display = 'block';
        }
    </script>
</body>
</html>
