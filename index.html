<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이화여자고등학교 교정 지도 및 위치 찾기</title>
    <style>
        /* 기본 전체 스타일 */
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* 메인 페이지 (지도 화면) */
        #map-view {
            text-align: center;
            padding: 20px;
        }

        h1 { color: #1b5e20; margin-bottom: 5px; }
        
        .instruction {
            color: #555;
            margin-bottom: 20px;
        }

        /* 위치 검색 바 */
        .search-bar {
            background-color: white;
            max-width: 900px;
            margin: 0 auto 20px auto;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-bar label {
            font-weight: bold;
            color: #1b5e20;
        }

        .search-bar select {
            padding: 10px 15px;
            font-size: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            min-width: 180px;
            cursor: pointer;
            outline: none;
        }
        .search-bar select:focus {
            border-color: #00643E;
        }

        .search-btn {
            background-color: #00643E;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-btn:hover {
            background-color: #004d30;
        }

        /* 지도를 감싸는 영역 */
        .image-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        /* 지도 이미지 */
        .image-container img {
            width: 100%;
            display: block;
        }

        /* 목적지 점을 찍을 투명 캔버스 */
        #route-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* 클릭 가능한 투명한 버튼(핀) 스타일 */
        .map-pin {
            position: absolute;
            background-color: rgba(46, 204, 113, 0.4);
            border: 2px solid #27ae60;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .map-pin:hover {
            background-color: rgba(46, 204, 113, 0.8);
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* 상세 설명 페이지 */
        #detail-view {
            display: none;
            padding: 40px 20px;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
        }

        #detail-title {
            color: #1b5e20;
            font-size: 28px;
            margin-bottom: 20px;
        }

        /* 상세 설명 내 삽입되는 이미지 스타일 */
        .detail-img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 8px;
            margin: 0 auto 20px auto;
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 이미지가 2장일 때 가로 배치를 위한 컨테이너 */
        .img-flex-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            max-width: 500px;
            margin: 0 auto 20px auto;
        }
        .img-flex-container .detail-img {
            flex: 1;
            width: 50%;
            margin-bottom: 0;
        }

        #detail-desc {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 40px;
            color: #444;
            text-align: left;
            display: inline-block;
            word-break: keep-all;
        }

        /* 층별 안내 박스 디자인 */
        .floor-plan {
            background-color: #f9f9f9;
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #ddd;
            font-size: 15px;
            line-height: 1.6;
        }

        /* 뒤로가기 버튼 */
        .back-btn {
            background-color: #1b5e20;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: block;
            margin: 0 auto;
        }

        .back-btn:hover { background-color: #144d18; }
    </style>
</head>
